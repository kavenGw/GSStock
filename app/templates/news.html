{% extends "base.html" %}
{% block title %}新闻看板{% endblock %}

{% block content %}
<style>
.news-item-new {
    background-color: #fff3cd;
    transition: background-color 3s ease;
}
.news-summary-card {
    border-left: 3px solid #0d6efd !important;
}
.importance-stars {
    color: #ffc107;
    font-size: 0.75rem;
    margin-left: 4px;
}
.keyword-tag {
    font-size: 0.7rem;
    padding: 1px 6px;
    margin-left: 4px;
}
.derivation-card {
    background: #f8f9fa;
    border-left: 3px solid #198754;
    padding: 12px;
    margin-top: 8px;
    border-radius: 4px;
    font-size: 0.9rem;
}
.derivation-sources {
    font-size: 0.75rem;
    color: #6c757d;
    margin-top: 8px;
}
.kw-manage-tag {
    display: inline-flex;
    align-items: center;
    position: relative;
    padding: 6px 14px;
    margin: 4px;
    border-radius: 20px;
    font-size: 0.85rem;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #e0e0e0;
}
.kw-manage-tag .kw-delete {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #dc3545;
    color: #fff;
    border: none;
    font-size: 14px;
    line-height: 16px;
    text-align: center;
    cursor: pointer;
    display: none;
    padding: 0;
}
.kw-manage-tag:hover .kw-delete { display: block; }
.kw-user { background: rgba(13,110,253,0.15); color: #6db3f8; border-color: rgba(13,110,253,0.3); }
.kw-company { background: rgba(25,135,84,0.15); color: #5dbb8a; border-color: rgba(25,135,84,0.3); }
.kw-ai { background: #f0f0f0; color: #6c757d; }
</style>
<div class="container-fluid mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h4 class="mb-1"><i class="bi bi-newspaper"></i> 新闻看板</h4>
            <small class="text-muted" id="newsStatus">加载中...</small>
        </div>
        <button class="btn btn-outline-secondary btn-sm" onclick="News.showKeywordModal()">
            <i class="bi bi-gear"></i> 关键词管理
        </button>
    </div>

    <ul class="nav nav-tabs mb-3" id="newsTabs">
        <li class="nav-item">
            <a class="nav-link active" data-tab="all" href="#">全部</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-tab="interest" href="#">兴趣</a>
        </li>
    </ul>

    <div id="loadingState">
        <div class="skeleton-card mb-2" style="height:60px"></div>
        <div class="skeleton-card mb-2" style="height:60px"></div>
        <div class="skeleton-card mb-2" style="height:60px"></div>
        <div class="skeleton-card mb-2" style="height:60px"></div>
    </div>

    <div id="contentArea" style="display:none">
        <div id="newsList"></div>
        <div class="text-center mt-3">
            <button class="btn btn-outline-secondary btn-sm" id="btnLoadMore" style="display:none">
                加载更多
            </button>
        </div>
    </div>

    <div id="emptyState" style="display:none">
        <div class="text-center py-5 text-muted">
            <i class="bi bi-newspaper" style="font-size:3rem"></i>
            <p class="mt-3">暂无新闻数据</p>
        </div>
    </div>
</div>

<!-- 关键词管理弹窗 -->
<div class="modal fade" id="keywordModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">关键词管理</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="input-group mb-3">
                    <input type="text" class="form-control" id="newKeywordInput" placeholder="输入关键词...">
                    <button class="btn btn-primary" onclick="News.addKeyword()">添加</button>
                </div>
                <div class="mb-3">
                    <strong>我的关键词</strong>
                    <div id="userKeywords" class="mt-2"></div>
                </div>
                <hr>
                <div class="input-group mb-3">
                    <input type="text" class="form-control" id="newCompanyInput" placeholder="输入公司名...">
                    <button class="btn btn-success" onclick="News.addCompany()">添加</button>
                </div>
                <div class="mb-3">
                    <strong>我的公司</strong>
                    <div id="companyKeywords" class="mt-2"></div>
                </div>
                <div id="aiRecommendSection" style="display:none">
                    <hr>
                    <strong>AI 推荐</strong>
                    <small class="text-muted">（基于你最近关注的新闻）</small>
                    <div id="aiKeywords" class="mt-2"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/news.js') }}"></script>
{% endblock %}
