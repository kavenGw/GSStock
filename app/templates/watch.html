{% extends 'base.html' %}
{% block title %}盯盘助手{% endblock %}

{% block extra_css %}
<style>
.btn-xs { padding: 0.1rem 0.4rem; font-size: 0.7rem; }
.chart-container { border-radius: 4px; background: #fafafa; }
.chart-toggle-icon { transition: transform 0.2s; font-size: 0.65rem; }
</style>
{% endblock %}

{% block content %}
<!-- 页面标题 -->
<div class="page-header mb-4">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h4 class="mb-1"><i class="bi bi-eye"></i> 盯盘助手</h4>
            <small class="text-muted" id="watchStatus">加载中...</small>
        </div>
        <div class="d-flex align-items-center gap-2">
            <button class="btn btn-outline-primary btn-sm" id="btnAnalyze" onclick="Watch.triggerAnalysis(true)">
                <i class="bi bi-robot"></i> AI 分析
            </button>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addStockModal">
                <i class="bi bi-plus-lg"></i> 添加
            </button>
        </div>
    </div>
</div>

<div class="row">
    <!-- 左侧：股票列表 -->
    <div class="col-lg-7">
        <!-- 骨架屏 -->
        <div id="loadingState" class="py-3">
            <div class="mb-4">
                <div class="skeleton skeleton-text w-25 mb-3" style="height:24px;"></div>
                <div class="skeleton-card skeleton mb-2" style="height:80px;"></div>
                <div class="skeleton-card skeleton mb-2" style="height:80px;"></div>
            </div>
        </div>
        <!-- 空状态 -->
        <div id="emptyState" class="text-center py-5 d-none">
            <i class="bi bi-eye-slash text-muted" style="font-size: 3rem;"></i>
            <p class="mt-3 text-muted">暂无盯盘股票</p>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addStockModal">
                <i class="bi bi-plus-lg"></i> 添加股票
            </button>
        </div>
        <!-- 市场分组列表 -->
        <div id="watchGroups" class="d-none"></div>
    </div>

    <!-- 右侧：AI 分析面板 -->
    <div class="col-lg-5">
        <div id="analysisPanel" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
                <div>
                    <strong><i class="bi bi-graph-up"></i> AI 分析</strong>
                    <small class="text-muted ms-2" id="analysisTime"></small>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <small class="text-muted" id="analysisCountdown"></small>
                    <button class="btn btn-outline-secondary btn-sm" onclick="Watch.triggerAnalysis(true)">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                </div>
            </div>
            <!-- 逐股分析卡片 -->
            <div id="analysisCards"></div>
            <!-- 综合摘要 -->
            <div id="analysisSummary" class="mt-3 d-none">
                <div class="border-top pt-3">
                    <strong class="small text-muted">综合摘要</strong>
                    <div id="summaryContent" class="small mt-1"></div>
                </div>
            </div>
        </div>
        <!-- 分析面板骨架屏 -->
        <div id="analysisLoading" class="d-none">
            <div class="skeleton skeleton-text w-50 mb-3" style="height:20px;"></div>
            <div class="skeleton-card skeleton mb-2" style="height:100px;"></div>
            <div class="skeleton-card skeleton mb-2" style="height:100px;"></div>
        </div>
    </div>
</div>

<!-- 添加股票 Modal -->
<div class="modal fade" id="addStockModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-plus-circle"></i> 添加盯盘股票</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <input type="text" class="form-control" id="stockSearchInput"
                           placeholder="搜索股票代码或名称..." oninput="Watch.searchStocks(this.value)">
                </div>
                <div id="searchResults" class="list-group" style="max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/watch.js') }}"></script>
{% endblock %}
