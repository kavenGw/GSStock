{% extends 'base.html' %}
{% block title %}盯盘助手{% endblock %}

{% block extra_css %}
<style>
.market-section { border-radius: 8px; }
.market-chart { height: 320px; border-radius: 4px; background: #fafafa; }
.stock-summary-table { font-size: 0.82rem; }
.stock-summary-table td, .stock-summary-table th { padding: 0.3rem 0.5rem; }
.stock-summary-table .stock-name { font-weight: 600; }
.price-range-bar { position: relative; height: 22px; background: #2a2a2e; border-radius: 3px; min-width: 180px; overflow: visible; }
.price-range-bar .range-fill { position: absolute; top: 0; height: 100%; border-radius: 3px; }
.price-range-bar .range-support { background: rgba(40,167,69,0.25); left: 0; }
.price-range-bar .range-resistance { background: rgba(220,53,69,0.25); right: 0; }
.price-range-bar .price-marker { position: absolute; top: -1px; width: 3px; height: 24px; background: #fff; border-radius: 2px; transform: translateX(-50%); z-index: 3; }
.price-range-bar .bar-label { position: absolute; top: 50%; transform: translateY(-50%); font-size: 0.68rem; white-space: nowrap; z-index: 2; }
.price-range-bar .label-support { left: 4px; color: #28a745; }
.price-range-bar .label-resistance { right: 4px; color: #dc3545; }
.price-range-bar .label-price { color: #fff; font-weight: 700; font-size: 0.72rem; }
.view-toggle .btn { padding: 0.15rem 0.6rem; font-size: 0.78rem; }
.view-toggle .btn.active { font-weight: 600; }
.price-up { color: #dc3545; }
.price-down { color: #28a745; }
.price-flat { color: #6c757d; }
.entry-signal {
    display: inline-block;
    padding: 0 0.4rem;
    border-radius: 3px;
    font-size: 0.7rem;
    font-weight: 600;
}
.entry-signal.signal-buy { background: #dcfce7; color: #16a34a; }
.entry-signal.signal-sell { background: #fef2f2; color: #dc2626; }
.entry-signal.signal-hold { background: #fef9c3; color: #ca8a04; }
.entry-signal.signal-watch { background: #f3f4f6; color: #6b7280; }
.td-badge {
    display: inline-block;
    padding: 0 0.5rem;
    border-radius: 3px;
    font-size: 0.72rem;
    font-weight: 700;
}
.td-badge-buy { background: #dcfce7; color: #16a34a; }
.td-badge-sell { background: #fef2f2; color: #dc2626; }
.td-badge-warn { animation: td-pulse 1s ease-in-out infinite; }
@keyframes td-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
{% endblock %}

{% block content %}
<div class="page-header mb-3">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h4 class="mb-1"><i class="bi bi-eye"></i> 盯盘助手</h4>
            <small class="text-muted">
                <span id="watchStatus">加载中...</span>
                <span id="lastRefreshTime" class="ms-2" style="display:none;"></span>
            </small>
        </div>
        <div>
            <button class="btn btn-outline-secondary btn-sm" onclick="Watch.showSignalSettings()">
                <i class="bi bi-gear"></i> 信号设置
            </button>
        </div>
    </div>
</div>

<!-- 基准标的 -->
<div id="benchmarkBar" class="mb-3">
    <div class="d-flex gap-2 flex-wrap" id="benchmarkCards">
        <div class="skeleton skeleton-card" style="height:48px;width:160px;"></div>
        <div class="skeleton skeleton-card" style="height:48px;width:160px;"></div>
        <div class="skeleton skeleton-card" style="height:48px;width:160px;"></div>
    </div>
</div>

<!-- 骨架屏 -->
<div id="loadingState" class="py-3">
    <div class="skeleton-card skeleton mb-3" style="height:300px;"></div>
    <div class="skeleton-card skeleton mb-3" style="height:300px;"></div>
</div>

<!-- 空状态 -->
<div id="emptyState" class="text-center py-5 d-none">
    <i class="bi bi-eye-slash text-muted" style="font-size: 3rem;"></i>
    <p class="mt-3 text-muted">暂无盯盘股票，请在 app/config/stock_codes.py 的 WATCH_CODES 配置</p>
</div>

<!-- 股票卡片列表 -->
<div id="stockCards" class="d-none"></div>

<!-- 信号阈值设置弹窗 -->
<div class="modal fade" id="signalSettingsModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-gear"></i> 信号阈值设置</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">RSI 超买阈值：<span id="wsRsiOverboughtValue">70</span></label>
                    <input type="range" class="form-range" min="60" max="90" value="70" id="wsRsiOverboughtRange"
                           oninput="document.getElementById('wsRsiOverboughtValue').textContent = this.value">
                </div>
                <div class="mb-3">
                    <label class="form-label">RSI 超卖阈值：<span id="wsRsiOversoldValue">30</span></label>
                    <input type="range" class="form-range" min="10" max="40" value="30" id="wsRsiOversoldRange"
                           oninput="document.getElementById('wsRsiOversoldValue').textContent = this.value">
                </div>
                <div class="mb-3">
                    <label class="form-label">放量倍数：<span id="wsVolumeRatioValue">2.0</span></label>
                    <input type="range" class="form-range" min="1.5" max="5" step="0.5" value="2" id="wsVolumeRatioRange"
                           oninput="document.getElementById('wsVolumeRatioValue').textContent = parseFloat(this.value).toFixed(1)">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="Watch.saveSignalSettings()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 价值洼地（盯盘股涨跌幅 + 高点回退排行） -->
<div class="mt-4 pt-3 border-top">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0"><i class="bi bi-graph-down-arrow"></i> 价值洼地</h5>
        <div class="btn-group btn-group-sm" id="period-toggle">
            <button type="button" class="btn btn-outline-primary" data-period="7d">7天</button>
            <button type="button" class="btn btn-primary" data-period="30d">30天</button>
            <button type="button" class="btn btn-outline-primary" data-period="90d">90天</button>
        </div>
    </div>
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover table-sm mb-0 align-middle">
                <thead>
                    <tr>
                        <th>股票</th>
                        <th>市场</th>
                        <th class="text-end">现价</th>
                        <th class="text-end">7d</th>
                        <th class="text-end">30d</th>
                        <th class="text-end">90d</th>
                        <th class="text-end" id="pullback-th">30日高点回退</th>
                    </tr>
                </thead>
                <tbody id="stock-body">
                    <tr><td colspan="7" class="text-center text-muted py-3">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/signal-detector.js') }}"></script>
<script src="{{ url_for('static', filename='js/watch.js') }}"></script>
<script src="{{ url_for('static', filename='js/value_dip.js') }}"></script>
{% endblock %}
