{% extends 'base.html' %}
{% block title %}盯盘助手{% endblock %}

{% block extra_css %}
<style>
.stock-card { border-radius: 8px; transition: box-shadow 0.2s; }
.stock-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.chart-container { height: 200px; border-radius: 4px; background: #fafafa; }
.analysis-tab .nav-link { padding: 0.25rem 0.75rem; font-size: 0.8rem; }
.analysis-tab .nav-link.active { font-weight: 600; }
.analysis-content { font-size: 0.85rem; min-height: 40px; }
.price-up { color: #dc3545; }
.price-down { color: #28a745; }
.price-flat { color: #6c757d; }
.bottom-panel { display: flex; gap: 12px; }
.bottom-panel .panel-left,
.bottom-panel .panel-right { flex: 1; min-width: 0; }
.panel-right table { font-size: 0.78rem; }
.panel-right th { font-weight: 600; color: #6b7280; }
.entry-signal {
    display: inline-block;
    padding: 0 0.4rem;
    border-radius: 3px;
    font-size: 0.7rem;
    font-weight: 600;
}
.entry-signal.signal-buy { background: #dcfce7; color: #16a34a; }
.entry-signal.signal-sell { background: #fef2f2; color: #dc2626; }
.entry-signal.signal-hold { background: #fef9c3; color: #ca8a04; }
.entry-signal.signal-watch { background: #f3f4f6; color: #6b7280; }
.td-badge {
    display: inline-block;
    padding: 0 0.5rem;
    border-radius: 3px;
    font-size: 0.72rem;
    font-weight: 700;
}
.td-badge-buy { background: #dcfce7; color: #16a34a; }
.td-badge-sell { background: #fef2f2; color: #dc2626; }
.td-badge-warn { animation: td-pulse 1s ease-in-out infinite; }
@keyframes td-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.earnings-table td, .earnings-table th { padding: 0.25rem 0.4rem; white-space: nowrap; }
</style>
{% endblock %}

{% block content %}
<div class="page-header mb-3">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h4 class="mb-1"><i class="bi bi-eye"></i> 盯盘助手</h4>
            <small class="text-muted">
                <span id="watchStatus">加载中...</span>
                <span id="lastRefreshTime" class="ms-2" style="display:none;"></span>
            </small>
        </div>
        <div class="d-flex align-items-center gap-2">
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addStockModal">
                <i class="bi bi-plus-lg"></i> 添加
            </button>
        </div>
    </div>
</div>

<!-- 基准标的 -->
<div id="benchmarkBar" class="mb-3">
    <div class="d-flex gap-2 flex-wrap" id="benchmarkCards">
        <div class="skeleton skeleton-card" style="height:48px;width:160px;"></div>
        <div class="skeleton skeleton-card" style="height:48px;width:160px;"></div>
        <div class="skeleton skeleton-card" style="height:48px;width:160px;"></div>
    </div>
</div>

<!-- 骨架屏 -->
<div id="loadingState" class="py-3">
    <div class="skeleton-card skeleton mb-3" style="height:300px;"></div>
    <div class="skeleton-card skeleton mb-3" style="height:300px;"></div>
</div>

<!-- 空状态 -->
<div id="emptyState" class="text-center py-5 d-none">
    <i class="bi bi-eye-slash text-muted" style="font-size: 3rem;"></i>
    <p class="mt-3 text-muted">暂无盯盘股票</p>
    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addStockModal">
        <i class="bi bi-plus-lg"></i> 添加股票
    </button>
</div>

<!-- 股票卡片列表 -->
<div id="stockCards" class="d-none"></div>

<!-- 添加股票 Modal -->
<div class="modal fade" id="addStockModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-plus-circle"></i> 添加盯盘股票</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <input type="text" class="form-control" id="stockSearchInput"
                           placeholder="搜索股票代码或名称..." oninput="Watch.searchStocks(this.value)">
                </div>
                <div id="searchResults" class="list-group" style="max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/watch.js') }}"></script>
{% endblock %}
